<!DOCTYPE html>
<html lang="zh-TW">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>矩形與圓形</title>
    <style>
        /* 矩形樣式 */
        .rectangle {
            width: 300px;
            height: 200px;
            background-color: blue;
            position: absolute;
            top: 100px;
            left: 100px;
        }

        /* 圓形樣式 */
        .circle {
            width: 200px;
            height: 200px;
            background-color: red;
            border-radius: 50%;
            position: absolute;
            top: 150px;
            left: 200px;
        }
    </style>
</head>
<body>
    <div class="rectangle"></div>
    <div class="circle"></div>
</body>
</html>
